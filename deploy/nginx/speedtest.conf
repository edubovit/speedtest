server {
    listen 80;
    #listen 443 ssl;
    
    #ssl_certificate /etc/letsencrypt/live/finland.edubovit.net/cert.pem;
    #ssl_certificate_key /etc/letsencrypt/live/finland.edubovit.net/privkey.pem;
    
    server_name _;
    
    client_max_body_size 64m;

    # To publish this app below /speedtest/ instead of /, add these
    # locations before the root location. The trailing slash on proxy_pass
    # strips the external prefix before forwarding to Spring Boot.
    #location = /speedtest {
    #    return 308 /speedtest/;
    #}
    #location /speedtest/ {
    #    proxy_pass http://127.0.0.1:23080/;
    #    proxy_http_version 1.1;
    #    proxy_set_header Host $host;
    #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #    proxy_set_header X-Forwarded-Proto $scheme;
    #    proxy_buffering off;
    #    proxy_request_buffering off;
    #    gzip off;
    #}

    location / {
        proxy_pass http://127.0.0.1:23080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        gzip off;
    }
}
